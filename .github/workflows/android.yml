name: Build Nexus Android Native APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Native Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Validate native Android project layout
        shell: bash
        run: |
          set -euxo pipefail
          test -d 05_APP_ANDROID_NATIVE
          test -f 05_APP_ANDROID_NATIVE/settings.gradle
          test -f 05_APP_ANDROID_NATIVE/build.gradle
          test -f 05_APP_ANDROID_NATIVE/app/build.gradle
          test -f 05_APP_ANDROID_NATIVE/app/src/main/AndroidManifest.xml
          test -f 05_APP_ANDROID_NATIVE/app/src/main/java/com/nexus/collector/MainActivity.java
          test -f 05_APP_ANDROID_NATIVE/app/src/main/java/com/nexus/collector/NexusMessagesWidgetProvider.java
          find 05_APP_ANDROID_NATIVE/app/src/main -type f | sort

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle
            05_APP_ANDROID_NATIVE/.gradle
          key: ${{ runner.os }}-native-gradle-${{ hashFiles('05_APP_ANDROID_NATIVE/**/*.gradle', '05_APP_ANDROID_NATIVE/**/*.java', '05_APP_ANDROID_NATIVE/**/*.xml') }}
          restore-keys: |
            ${{ runner.os }}-native-gradle-

      - name: Install Android SDK platform
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build native debug APK
        shell: bash
        run: |
          set -euxo pipefail
          cd 05_APP_ANDROID_NATIVE
          gradle --no-daemon :app:assembleDebug
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/Nexus-Chef-Native-v1.5.5-debug.apk
          ls -lah app/build/outputs/apk/debug dist
          test -f dist/Nexus-Chef-Native-v1.5.5-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Nexus-Chef-Native-v1.5.5-APK
          path: 05_APP_ANDROID_NATIVE/dist/Nexus-Chef-Native-v1.5.5-debug.apk
          if-no-files-found: error

      - name: Upload Build Diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Nexus-Native-Build-Diagnostics
          path: |
            05_APP_ANDROID_NATIVE/app/build/reports/**
            05_APP_ANDROID_NATIVE/app/build/outputs/logs/**
          if-no-files-found: ignore
