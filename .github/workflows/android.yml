name: Build Nexus Android Daemon APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Validate project layout
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          test -d 05_APP_ANDROID
          test -f 05_APP_ANDROID/buildozer.spec
          test -f 05_APP_ANDROID/main.py
          find 05_APP_ANDROID -maxdepth 2 -type f | sort

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache Buildozer Global Cache
        uses: actions/cache@v5
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-${{ steps.get-date.outputs.date }}-v5
          restore-keys: |
            ${{ runner.os }}-buildozer-global-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-

      - name: Cache Buildozer Project Cache
        uses: actions/cache@v5
        with:
          path: 05_APP_ANDROID/.buildozer
          key: ${{ runner.os }}-buildozer-local-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-v5
          restore-keys: |
            ${{ runner.os }}-buildozer-local-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle
            05_APP_ANDROID/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-v5
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install System Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ccache \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            pkg-config \
            patch \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            lld \
            gperf \
            xsltproc \
            libgdbm-dev \
            libgdbm-compat-dev \
            zlib1g-dev \
            unzip \
            zip \
            tar \
            gzip \
            bzip2

      - name: Install Python Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install "cython<3.0" buildozer gitpython jinja2
          python -m buildozer --version || buildozer --version

      - name: Build Android Debug APK
        shell: bash
        run: |
          set -euxo pipefail
          cd 05_APP_ANDROID
          set +o pipefail
          yes | buildozer android debug
          buildozer_status=${PIPESTATUS[1]}
          set -o pipefail
          test "$buildozer_status" -eq 0
          test -d bin
          ls -lah bin
          test -n "$(find bin -maxdepth 1 -name '*.apk' -type f -print -quit)"
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Nexus-Daemon-APK
          path: 05_APP_ANDROID/bin/*.apk
          if-no-files-found: error

      - name: Upload Build Diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Nexus-Build-Diagnostics
          path: |
            05_APP_ANDROID/.buildozer/**/*.log
            05_APP_ANDROID/.buildozer/android/platform/build-*/build.log
            05_APP_ANDROID/.buildozer/android/platform/python-for-android/**/*.log
          if-no-files-found: ignore
