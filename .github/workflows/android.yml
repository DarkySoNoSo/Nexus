name: Build Nexus Android Daemon APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer Global Cache
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-${{ steps.get-date.outputs.date }}-v3
          restore-keys: |
            ${{ runner.os }}-buildozer-global-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-

      - name: Cache Buildozer Project Cache
        uses: actions/cache@v4
        with:
          path: 05_APP_ANDROID/.buildozer
          key: ${{ runner.os }}-buildozer-local-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-v3
          restore-keys: |
            ${{ runner.os }}-buildozer-local-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle
            05_APP_ANDROID/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('05_APP_ANDROID/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ccache \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            pkg-config \
            patch \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            lld \
            gperf \
            xsltproc \
            libgdbm-dev \
            libgdbm-compat-dev \
            zlib1g-dev \
            unzip \
            zip \
            tar \
            gzip \
            bzip2

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer gitpython jinja2

      - name: Build Android Debug APK
        run: |
          cd 05_APP_ANDROID
          # use non-interactive pipe 'yes' to auto-accept all SDK, NDK, and tool downloads and licenses
          yes | buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload Compile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Daemon-APK
          path: 05_APP_ANDROID/bin/*.apk
