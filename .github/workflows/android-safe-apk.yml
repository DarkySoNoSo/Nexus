name: Build Nexus Android Safe APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-safe:
    name: Build crash-safe native Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK platform
        shell: bash
        run: |
          set -euxo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Patch native app for Samsung/Android crash-safe launch
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('05_APP_ANDROID_NATIVE/app/src/main/java/com/nexus/collector/MainActivity.java')
          s = p.read_text()
          if 'import android.util.Log;' not in s:
              s = s.replace('import android.os.Bundle;\n', 'import android.os.Bundle;\nimport android.util.Log;\n')
          old = '''    @Override protected void onCreate(Bundle state) {\n        super.onCreate(state);\n        enableFullscreen();\n        setContentView(buildUi());\n        showHome();\n    }\n\n    @Override protected void onResume() {\n        super.onResume();\n        enableFullscreen();\n        if (PAGE_HOME.equals(currentPage)) showHome();\n    }\n\n    @Override public void onWindowFocusChanged(boolean hasFocus) {\n        super.onWindowFocusChanged(hasFocus);\n        if (hasFocus) enableFullscreen();\n    }\n'''
          new = '''    @Override protected void onCreate(Bundle state) {\n        super.onCreate(state);\n        installCrashGuard();\n        try {\n            safeFullscreen();\n            setContentView(buildUi());\n            showHome();\n        } catch (Throwable t) {\n            showCrashScreen("onCreate", t);\n        }\n    }\n\n    @Override protected void onResume() {\n        super.onResume();\n        safeFullscreen();\n    }\n\n    @Override public void onWindowFocusChanged(boolean hasFocus) {\n        super.onWindowFocusChanged(hasFocus);\n        if (hasFocus) safeFullscreen();\n    }\n'''
          s = s.replace(old, new)
          old = '''    private void enableFullscreen() {\n        Window window = getWindow();\n        if (Build.VERSION.SDK_INT >= 30) {\n            window.setDecorFitsSystemWindows(false);\n            WindowInsetsController controller = window.getInsetsController();\n            if (controller != null) {\n                controller.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());\n                controller.setSystemBarsBehavior(WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);\n            }\n        }\n        window.getDecorView().setSystemUiVisibility(\n                View.SYSTEM_UI_FLAG_FULLSCREEN\n                        | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION\n                        | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY\n                        | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN\n                        | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n                        | View.SYSTEM_UI_FLAG_LAYOUT_STABLE\n        );\n    }\n'''
          new = '''    private void installCrashGuard() {\n        Thread.setDefaultUncaughtExceptionHandler((thread, throwable) -> runOnUiThread(() -> showCrashScreen("uncaught:" + thread.getName(), throwable)));\n    }\n\n    private void safeFullscreen() {\n        try { enableFullscreen(); } catch (Throwable t) { Log.w("NexusMain", "Fullscreen disabled after failure", t); }\n    }\n\n    private void enableFullscreen() {\n        Window window = getWindow();\n        if (window == null) return;\n        if (Build.VERSION.SDK_INT >= 30) window.setDecorFitsSystemWindows(true);\n        View decor = window.getDecorView();\n        if (decor != null) decor.setSystemUiVisibility(View.SYSTEM_UI_FLAG_LAYOUT_STABLE);\n    }\n\n    private void showCrashScreen(String phase, Throwable t) {\n        try {\n            String report = "NEXUS SAFE CRASHSCREEN\\nPhase: " + phase + "\\nAndroid SDK: " + Build.VERSION.SDK_INT + "\\nDevice: " + Build.MANUFACTURER + " " + Build.MODEL + "\\n\\n" + Log.getStackTraceString(t);\n            Log.e("NexusCrash", report, t);\n            ScrollView scroll = new ScrollView(this);\n            scroll.setFillViewport(true);\n            scroll.setBackgroundColor(Color.BLACK);\n            TextView out = new TextView(this);\n            out.setText(report);\n            out.setTextColor(Color.WHITE);\n            out.setTextSize(13);\n            out.setPadding(dp(16), dp(16), dp(16), dp(16));\n            scroll.addView(out);\n            setContentView(scroll);\n        } catch (Throwable ignored) {\n            TextView out = new TextView(this);\n            out.setText("NEXUS STARTFEHLER: " + t.getClass().getName() + ": " + t.getMessage());\n            out.setTextColor(Color.WHITE);\n            out.setBackgroundColor(Color.BLACK);\n            setContentView(out);\n        }\n    }\n'''
          s = s.replace(old, new)
          s = s.replace('        enableFullscreen();\n    }\n\n    private LinearLayout activePanel()', '        safeFullscreen();\n    }\n\n    private LinearLayout activePanel()')
          s = s.replace('''        TextView snapshot = logBox("Lade Kurzlage...");\n        p.addView(snapshot, card(8));\n        loadHomeSnapshot(snapshot);\n''', '''        TextView snapshot = logBox("Start OK. Keine automatische Serverabfrage beim App-Start. Nutze Verbindung testen oder oeffne Nachrichten/Dateien manuell.");\n        p.addView(snapshot, card(8));\n''')
          p.write_text(s)

          g = Path('05_APP_ANDROID_NATIVE/app/build.gradle')
          t = g.read_text().replace('versionCode 23', 'versionCode 24').replace('versionName "1.6.2"', 'versionName "1.6.3-safe"')
          g.write_text(t)
          PY

      - name: Build safe debug APK
        shell: bash
        run: |
          set -euxo pipefail
          cd 05_APP_ANDROID_NATIVE
          gradle --no-daemon :app:assembleDebug
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/Nexus-Chef-Native-v1.6.3-safe-debug.apk
          ls -lah app/build/outputs/apk/debug dist
          test -f dist/Nexus-Chef-Native-v1.6.3-safe-debug.apk

      - name: Upload Safe APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Nexus-Chef-Native-v1.6.3-safe-APK
          path: 05_APP_ANDROID_NATIVE/dist/Nexus-Chef-Native-v1.6.3-safe-debug.apk
          if-no-files-found: error

      - name: Upload Build Diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Nexus-Native-Safe-Build-Diagnostics
          path: |
            05_APP_ANDROID_NATIVE/app/build/reports/**
            05_APP_ANDROID_NATIVE/app/build/outputs/logs/**
          if-no-files-found: ignore
