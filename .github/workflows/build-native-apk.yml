name: Build Nexus Native APK

on:
  workflow_dispatch:
  push:
    paths:
      - "05_APP_ANDROID_NATIVE/**"
      - "settings.gradle"
      - "build.gradle"
      - ".github/workflows/build-native-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APKs
        run: gradle :app:assembleNexusDebug :app:assembleDigipadDebug --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p out
          cp 05_APP_ANDROID_NATIVE/app/build/outputs/apk/nexus/debug/app-nexus-debug.apk out/Nexus-Nexi-v1.6.176-nexus-debug.apk
          cp 05_APP_ANDROID_NATIVE/app/build/outputs/apk/digipad/debug/app-digipad-debug.apk out/DigiPad-Fiona-v0.1-debug.apk
          ls -lh out

      - name: Upload Nexus APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Nexi-v1.6.176-nexus-debug
          path: out/Nexus-Nexi-v1.6.176-nexus-debug.apk

      - name: Upload DigiPad APK
        uses: actions/upload-artifact@v4
        with:
          name: DigiPad-Fiona-v0.1-debug
          path: out/DigiPad-Fiona-v0.1-debug.apk
